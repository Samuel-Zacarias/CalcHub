<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Calculadora de coisas ✔</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioNota.html">Calculadora de Nota📈</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioFuncionario.html">Calculadora de Funcionario 👩‍🚒</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioProduto.html">Calculadora de Produto🎁</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioTriangulo.html">Calculadora de Triângulo📐</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid p-5 bg-primary text-white text-center">
        <h1>Calculadora de IMC</h1>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Cálculo de IMC</h2>

                    <form action="/pessoa/imc" method="get">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome:</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                placeholder="Digite o seu nome" 
                                name="txtNome" 
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="peso" class="form-label">Peso (kg):</label>
                            <input 
                                type="number" 
                                step="0.01" min="0.01"
                                class="form-control" 
                                placeholder="Ex: 80.5" 
                                name="txtPeso" 
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="altura" class="form-label">Altura (m):</label>
                            <input 
                                type="number" 
                                step="0.01" min="0.01"
                                class="form-control" 
                                placeholder="Ex: 1.75" 
                                name="txtAltura" 
                                required
                            />
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary w-100">
                                Calcular IMC
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <br />
</body>

</html>
