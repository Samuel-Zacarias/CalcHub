<body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Calculadora de coisas ✔</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioNota.html">Calculadora de Nota📈</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formularioPessoa.html">Calculadora de IMC 💪</a>

                <li class="nav-item">

                    <a class="nav-link" href="formularioProduto.html">Calculadora de Produto🎁</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid p-5 bg-primary text-white text-center">
        <h1>Calculadora de Triângulo</h1>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Classificação de Triângulo</h2>

                    <form action="/triangulo/calcular" method="get">

                        <div class="mb-3">
                            <label>Lado 1:</label>
                            <input type="text" class="form-control" placeholder="Digite o primeiro lado" name="txtLado1" required>
                        </div>

                        <div class="mb-3">
                            <label>Lado 2:</label>
                            <input type="text" class="form-control" placeholder="Digite o segundo lado" name="txtLado2" required>
                        </div>

                        <div class="mb-3">
                            <label>Lado 3:</label>
                            <input type="text" class="form-control" placeholder="Digite o terceiro lado" name="txtLado3" required>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                Calcular Triângulo
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</body>
