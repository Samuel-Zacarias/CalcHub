    <div class="container-fluid p-5 bg-primary text-white text-center">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Média do Aluno</h2>

                    <form action="/nota/calcular" method="get">

                        <div class="mb-3">
                            <label>Nome do Aluno:</label>
                            <input type="text" class="form-control" placeholder="Digite o nome do aluno" name="txtNome" required>
                        </div>

                        <div class="mb-3">
                            <label>Nota 1:</label>
                            <input type="text" class="form-control" placeholder="Digite a primeira nota" name="txtNota1" required>
                        </div>

                        <div class="mb-3">
                            <label>Nota 2:</label>
                            <input type="text" class="form-control" placeholder="Digite a segunda nota" name="txtNota2" required>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                Calcular Média
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
